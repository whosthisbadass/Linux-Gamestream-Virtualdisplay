[environment]
name = "linux-gamestream-virtualdisplay"

description = """
Environment for developing Linux-Gamestream-Virtualdisplay,
a Sunshine virtual monitor implementation using VKMS + Gamescope.
"""

[dependencies]

# streaming stack
sunshine = true
gamescope = true
pipewire = true
wireplumber = true
xdg-desktop-portal = true

# graphics
mesa-utils = true
vulkan-tools = true
libdrm = true

# development tools
git = true
jq = true
curl = true

# build tools
golang = true
gcc = true
make = true
pkg-config = true

# scripting
python3 = true
python3-dbus = true
python3-gi = true
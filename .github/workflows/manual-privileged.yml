name: Manual Privileged VKMS

on:
  workflow_dispatch:

jobs:
  vkms-integration:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
      - name: Run privileged VKMS integration tests
        env:
          SVD_PRIVILEGED_TESTS: "1"
        run: go test ./internal/vkms -run TestCreateDestroyPrivileged -v
